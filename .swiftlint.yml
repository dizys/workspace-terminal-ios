# SwiftLint configuration
# https://github.com/realm/SwiftLint

excluded:
  - .build
  - DerivedData
  - Tuist/Dependencies
  - "**/.swiftpm"
  - fastlane

opt_in_rules:
  - array_init
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - lower_acl_than_parent
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - yoda_condition

disabled_rules:
  - todo
  - line_length          # SwiftFormat handles wrapping
  - trailing_comma       # SwiftFormat handles
  - opening_brace        # SwiftFormat handles
  - multiple_closures_with_trailing_closure  # SwiftUI views naturally have these

line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_comments: true

identifier_name:
  min_length: 2
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - r
    - g
    - b
    - a

type_name:
  min_length: 3
  max_length: 60

function_body_length:
  warning: 60
  error: 120

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 12
  error: 20

nesting:
  type_level: 3
  function_level: 5
