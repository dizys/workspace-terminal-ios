name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TUIST_ANALYTICS_DISABLED: "1"

jobs:
  lint:
    name: Lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
        with:
          version: 2025.1.6
      - name: SwiftFormat (check)
        run: swiftformat --lint .
      - name: SwiftLint (strict)
        run: swiftlint lint --strict --quiet

  test-packages:
    name: Test (${{ matrix.package }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package:
          - CoderAPI
          - PTYTransport
          - Auth
          - DesignSystem
          - TerminalUI
          - StoreKitClient
          - WorkspaceFeature
          - TerminalFeature
          - AppFeature
          - TestSupport
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            Packages/${{ matrix.package }}/.build
            ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ matrix.package }}-${{ hashFiles(format('Packages/{0}/Package.swift', matrix.package)) }}
          restore-keys: spm-${{ matrix.package }}-
      - name: Resolve & test
        working-directory: Packages/${{ matrix.package }}
        run: |
          swift package resolve
          swift test --parallel

  build-app:
    name: Build app (Tuist)
    runs-on: macos-26
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app
      - uses: jdx/mise-action@v2
        with:
          version: 2025.1.6
      - name: Install xcbeautify
        run: brew install xcbeautify
      - name: Cache Tuist
        uses: actions/cache@v4
        with:
          path: |
            ~/.tuist
            .tuist
            ~/Library/Developer/Xcode/DerivedData
          key: tuist-${{ hashFiles('Tuist/**', 'Project.swift', 'Packages/**/Package.swift') }}
          restore-keys: tuist-
      - name: Tuist install
        run: tuist install
      - name: Tuist generate
        run: tuist generate --no-open
      - name: Build (Debug, simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace WorkspaceTerminal.xcworkspace \
            -scheme WorkspaceTerminal \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log | xcbeautify
      - name: Dump xcodebuild log on failure
        if: failure()
        run: |
          echo "=== Lines containing 'error:' or 'warning:' ==="
          grep -E "(error:|warning:|FAILED)" xcodebuild.log || echo "(no matches)"
          echo ""
          echo "=== 100 lines around 'BUILD FAILED' ==="
          grep -n -B 100 "BUILD FAILED" xcodebuild.log | tail -120 || true
          echo ""
          echo "=== Full log byte count ==="
          wc -l xcodebuild.log

  test-app:
    name: Test app (${{ matrix.device }})
    runs-on: macos-26
    needs: [build-app]
    strategy:
      fail-fast: false
      matrix:
        device:
          - "iPhone 17 Pro"
          - "iPad Pro 13-inch (M5)"
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app
      - uses: jdx/mise-action@v2
        with:
          version: 2025.1.6
      - name: Install xcbeautify
        run: brew install xcbeautify
      - name: List installed simulator runtimes
        run: xcrun simctl list runtimes
      - name: Tuist install
        run: tuist install
      - name: Tuist generate
        run: tuist generate --no-open
      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -workspace WorkspaceTerminal.xcworkspace \
            -scheme WorkspaceTerminal \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            -derivedDataPath build \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee xcodebuild.log | xcbeautify
      - name: Dump xcodebuild log on failure
        if: failure()
        run: |
          echo "=== Lines containing 'error:' or 'warning:' ==="
          grep -E "(error:|warning:|FAILED)" xcodebuild.log || echo "(no matches)"
          echo ""
          echo "=== 100 lines around 'BUILD FAILED' ==="
          grep -n -B 100 "BUILD FAILED" xcodebuild.log | tail -120 || true
          echo ""
          echo "=== Full log byte count ==="
          wc -l xcodebuild.log
