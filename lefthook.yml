# https://lefthook.dev
# Run `lefthook install` once after cloning.

pre-commit:
  parallel: true
  commands:
    swiftformat:
      glob: "*.swift"
      run: swiftformat {staged_files}
      stage_fixed: true
    swiftlint:
      glob: "*.swift"
      run: swiftlint lint --quiet --strict {staged_files}

commit-msg:
  commands:
    enforce-conventional:
      run: |
        head -n1 {1} | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9-]+\))?: .+' || {
          echo "Commit message must follow Conventional Commits."
          echo "Format: <type>(<scope>): <subject>"
          echo "Types:  feat fix docs style refactor perf test build ci chore revert"
          exit 1
        }
